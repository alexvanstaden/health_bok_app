# The Web App stack (ADR-0009): Postgres + the Python HTTP API + the Next.js Web
# App + the admission worker, plus the Part-1 daily pipeline as a scheduled
# container. One Postgres is the only datastore (ADR-0003). Reachable only over
# Tailscale — the tailnet is the auth boundary, no login screen (ADR-0009): bind
# the published ports to your tailnet address, not 0.0.0.0, in production.
#
# Secrets come from a local .env (see .env.example); never commit the real one.

services:
  db:
    image: pgvector/pgvector:pg16  # Postgres + the `vector` extension (ADR-0008)
    restart: unless-stopped
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health}
      POSTGRES_DB: health_bok
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health_bok"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "health_bok.api:app", "--host", "0.0.0.0", "--port", "8000"]
    # The API needs the LLM key at request time: OPENAI_API_KEY to embed Concept
    # mentions (personal-layer writes, issue #16) and the query question, and — by
    # default (LLM_PROVIDER=openai, ADR-0012) — to synthesize grounded answers
    # (query, issue #17) and judge Impacts. Set LLM_PROVIDER=anthropic with an
    # ANTHROPIC_API_KEY in .env to run the chat tasks on Claude instead. The
    # `environment` block below still overrides DATABASE_URL to the compose db.
    env_file: .env
    environment:
      DATABASE_URL: postgresql://health:${POSTGRES_PASSWORD:-health}@db:5432/health_bok
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"  # bind to your tailnet IP in production

  worker:
    build: .
    # The worker drains the admission queue; a transient crash (a DB hiccup, a bad
    # job) must not leave it dead, or approvals queue up untouched. Restart it.
    restart: unless-stopped
    command: ["health-bok", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://health:${POSTGRES_PASSWORD:-health}@db:5432/health_bok
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    environment:
      # The browser reaches the API over the tailnet; override for your host.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"  # bind to your tailnet IP in production

  # The Part-1 daily pipeline as a scheduled container (ADR-0009): runs the job,
  # then sleeps a day. Replaces the host cron/systemd timer. Set DIGEST_ENABLED
  # and WEBAPP_BASE_URL in .env to control the notification email (ADR-0007).
  pipeline:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "while true; do health-bok run || true; sleep 86400; done"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://health:${POSTGRES_PASSWORD:-health}@db:5432/health_bok
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
